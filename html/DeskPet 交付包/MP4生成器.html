<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>DeskPet · MP4 导出</title>
<style>
  :root{ font-family:-apple-system,"PingFang SC","Segoe UI",sans-serif; }
  html,body{ margin:0; background:#16181c; color:#e8eaed; }
  header{ padding:26px 32px 10px; }
  h1{ margin:0; font-size:22px; letter-spacing:.5px; }
  .sub{ margin-top:6px; color:#9aa0a8; font-size:13px; }
  .bar{ display:flex; gap:12px; align-items:center; padding:14px 32px 22px; }
  button{ font:inherit; cursor:pointer; border:none; border-radius:10px; padding:11px 18px; font-size:14px; font-weight:600; }
  .primary{ background:#2e8bff; color:#fff; }
  .ghost{ background:#262a30; color:#cfd3d9; }
  button:disabled{ opacity:.5; cursor:default; }
  #status{ color:#9aa0a8; font-size:13px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:20px; padding:0 32px 48px; }
  .card{ background:#1d2025; border:1px solid #262a30; border-radius:16px; padding:14px; text-align:center; }
  .card canvas{ width:190px; height:190px; border-radius:14px; background:#000; }
  .name{ margin:10px 0 4px; font-size:14px; font-weight:600; }
  .card button{ margin-top:8px; padding:8px 14px; font-size:13px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5.1.5/build/mp4-muxer.min.js"></script>
</head>
<body>
<header>
  <h1>DeskPet · 形象 MP4 导出</h1>
  <div class="sub">蓝色发光眼 · 480×480 · 3 秒循环 H.264 MP4 · 纯黑底</div>
</header>
<div class="bar">
  <button class="primary" id="zipBtn">⬇︎ 打包下载全部 (ZIP)</button>
  <span id="status">就绪</span>
</div>
<div class="grid" id="grid"></div>
<script>
const TAU=Math.PI*2;
const BLUE='#2e8bff', BLUEG='rgba(46,139,255,0.95)';
const PINK='#ff5c8a', RED='#ff5a48', GREEN='#3de07a', REDL='#ff6b5a';
function glow(c,b,ctx){ctx.shadowColor=c;ctx.shadowBlur=b;}
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
function blinkF(t,period,times){const bt=t%period;for(const m of times){const d=0.16;if(bt>m&&bt<m+d){const p=(bt-m)/d;return 0.06+0.94*Math.abs(Math.cos(p*Math.PI));}}return 1;}
function blush(ctx,cx,cy,w,h){const g=ctx.createRadialGradient(cx,cy,0,cx,cy,w/2);g.addColorStop(0,'rgba(255,130,150,0.5)');g.addColorStop(0.7,'rgba(255,130,150,0)');ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(cx,cy,w/2,h/2,0,0,TAU);ctx.fill();}
function heartPath(ctx,x,y,w,h){const tc=h*0.3;ctx.beginPath();ctx.moveTo(x,y+tc);ctx.bezierCurveTo(x,y,x-w/2,y,x-w/2,y+tc);ctx.bezierCurveTo(x-w/2,y+(h+tc)/2,x,y+(h+tc)/2,x,y+h);ctx.bezierCurveTo(x,y+(h+tc)/2,x+w/2,y+(h+tc)/2,x+w/2,y+tc);ctx.bezierCurveTo(x+w/2,y,x,y,x,y+tc);ctx.closePath();}
function eyeCap(ctx,cx,cy,w,h,color,g1){glow(g1,30,ctx);ctx.fillStyle=color;rr(ctx,cx-w/2,cy-h/2,w,h,Math.min(w,h)/2);ctx.fill();ctx.shadowBlur=0;}

function draw(ctx,name,t){
  ctx.fillStyle='#000';ctx.fillRect(0,0,480,480);
  const CX=240,CY=240,NO=()=>ctx.shadowBlur=0;
  if(name==='idle'){
    const bob=Math.sin(t*TAU/3)*7,k=blinkF(t,3,[1.3,2.7]);
    eyeCap(ctx,CX-84,CY+bob,104,158*k,BLUE,BLUEG);eyeCap(ctx,CX+84,CY+bob,104,158*k,BLUE,BLUEG);
    blush(ctx,CX-120,CY+88,84,42);blush(ctx,CX+120,CY+88,84,42);
  }else if(name==='happy'){
    const bob=Math.sin(t*TAU/2.2)*9;
    for(const sx of[-94,94]){glow(BLUEG,30,ctx);ctx.fillStyle=BLUE;ctx.beginPath();const w=130,h=70,x=CX+sx-w/2,y=CY-10+bob;ctx.moveTo(x,y+h);ctx.lineTo(x,y+h*0.5);ctx.arc(x+w/2,y+h*0.5,w/2,Math.PI,0);ctx.lineTo(x+w,y+h);ctx.closePath();ctx.fill();NO();}
    blush(ctx,CX-128,CY+92,96,48);blush(ctx,CX+128,CY+92,96,48);
  }else if(name==='sleepy'){
    for(const[sx,rot]of[[-92,7],[92,-7]]){ctx.save();ctx.translate(CX+sx,CY);ctx.rotate(rot*Math.PI/180);glow(BLUEG,18,ctx);ctx.fillStyle=BLUE;rr(ctx,-56,-12,112,24,12);ctx.fill();NO();ctx.restore();}
    ctx.textAlign='center';
    for(const[ch,sz,delay]of[['z',26,0],['Z',34,1.1],['Z',44,2.2]]){const lt=((t-delay)%3.2+3.2)%3.2,p=lt/3.2,al=p<0.2?p/0.2:(1-(p-0.2)/0.8);ctx.globalAlpha=Math.max(0,al);ctx.fillStyle=BLUE;glow(BLUEG,12,ctx);ctx.font='800 '+sz+'px sans-serif';ctx.fillText(ch,330+p*38,200-p*96);NO();}
    ctx.globalAlpha=1;
  }else if(name==='curious'){
    const rot=Math.sin(t*TAU/3)*3*Math.PI/180;ctx.save();ctx.translate(CX,CY);ctx.rotate(rot);
    glow(BLUEG,30,ctx);ctx.fillStyle=BLUE;ctx.beginPath();ctx.arc(-78,4,64,0,TAU);ctx.fill();ctx.beginPath();ctx.arc(82,0,75,0,TAU);ctx.fill();NO();
    ctx.fillStyle='#fff';ctx.globalAlpha=0.92;ctx.beginPath();ctx.arc(-96,-16,17,0,TAU);ctx.fill();ctx.beginPath();ctx.arc(62,-22,20,0,TAU);ctx.fill();ctx.globalAlpha=1;ctx.restore();
    const pp=0.5+0.5*Math.sin(t*TAU/1.6);ctx.globalAlpha=0.5+0.5*pp;ctx.fillStyle=BLUE;glow(BLUEG,22,ctx);ctx.font='800 76px sans-serif';ctx.textAlign='center';ctx.save();ctx.translate(330,150);ctx.scale(0.9+0.2*pp,0.9+0.2*pp);ctx.fillText('?',0,0);ctx.restore();NO();ctx.globalAlpha=1;
  }else if(name==='angry'){
    const sh=Math.sin(t*TAU/0.45)*5;
    for(const[sx,rot]of[[-86,18],[86,-18]]){ctx.save();ctx.translate(CX+sx+sh,CY);ctx.rotate(rot*Math.PI/180);glow(BLUEG,26,ctx);ctx.fillStyle=BLUE;rr(ctx,-65,-37,130,74,40);ctx.fill();NO();ctx.restore();}
    const pp=0.5+0.5*Math.sin(t*TAU/1.4);ctx.strokeStyle=REDL;ctx.lineWidth=5;ctx.globalAlpha=0.7;ctx.beginPath();ctx.arc(120,120,15*(0.8+0.3*pp),0,TAU);ctx.stroke();ctx.beginPath();ctx.arc(360,108,11*(0.8+0.3*pp),0,TAU);ctx.stroke();ctx.globalAlpha=1;
  }else if(name==='love'){
    const s=Math.max(0,Math.sin(t*TAU/1.4)),beat=1+0.16*s*s;
    for(const sx of[-95,95]){ctx.save();ctx.translate(CX+sx,CY);ctx.scale(beat,beat);glow('rgba(255,92,138,0.7)',24,ctx);ctx.fillStyle=PINK;heartPath(ctx,0,-66,150,140);ctx.fill();NO();ctx.restore();}
    for(const[dx,delay]of[[-30,0],[24,1.4]]){const lt=((t-delay)%3+3)%3,p=lt/3;ctx.globalAlpha=Math.max(0,p<0.2?p/0.2*0.95:0.95*(1-(p-0.2)/0.8));ctx.fillStyle='#ff7aa5';heartPath(ctx,250+dx*p,360-p*180,30-(delay>0?6:0),28);ctx.fill();}
    ctx.globalAlpha=1;
  }else if(name==='charging'){
    for(const sx of[-76,76]){glow(BLUEG,28,ctx);ctx.fillStyle=BLUE;ctx.beginPath();const w=96,h=52,x=CX+sx-w/2,y=150;ctx.moveTo(x,y+h);ctx.lineTo(x,y+h*0.5);ctx.arc(x+w/2,y+h*0.5,w/2,Math.PI,0);ctx.lineTo(x+w,y+h);ctx.closePath();ctx.fill();NO();}
    const bw=176,bh=88,bx=CX-bw/2-7,by=270;glow('rgba(61,224,122,0.5)',22,ctx);ctx.strokeStyle=GREEN;ctx.lineWidth=8;rr(ctx,bx,by,bw,bh,18);ctx.stroke();NO();ctx.fillStyle=GREEN;rr(ctx,bx+bw+4,by+26,11,36,4);ctx.fill();
    const fill=0.55+0.33*(0.5+0.5*Math.sin(t*TAU/2.2));ctx.save();rr(ctx,bx+6,by+6,bw-12,bh-12,12);ctx.clip();ctx.fillStyle=GREEN;ctx.fillRect(bx+6,by+bh-6-(bh-12)*fill,bw-12,(bh-12)*fill);ctx.restore();
    ctx.fillStyle='#063019';const cx2=CX,cy2=by+bh/2;ctx.beginPath();ctx.moveTo(cx2+4,cy2-26);ctx.lineTo(cx2-16,cy2+4);ctx.lineTo(cx2-2,cy2+4);ctx.lineTo(cx2-8,cy2+26);ctx.lineTo(cx2+16,cy2-8);ctx.lineTo(cx2+2,cy2-8);ctx.closePath();ctx.fill();
  }else if(name==='low-battery'){
    const a=0.55+0.45*Math.sin(t*TAU/1.6);
    for(const[sx,rot]of[[-92,-10],[92,10]]){ctx.save();ctx.translate(CX+sx,CY-20);ctx.rotate(rot*Math.PI/180);glow(BLUEG,16,ctx);ctx.fillStyle=BLUE;ctx.globalAlpha=0.9;rr(ctx,-52,-13,104,26,13);ctx.fill();ctx.globalAlpha=1;NO();ctx.restore();}
    ctx.globalAlpha=a;const bw=176,bh=88,bx=CX-bw/2-7,by=270;glow('rgba(255,90,72,0.45)',22,ctx);ctx.strokeStyle=RED;ctx.lineWidth=8;rr(ctx,bx,by,bw,bh,18);ctx.stroke();NO();ctx.fillStyle=RED;rr(ctx,bx+bw+4,by+26,11,36,4);ctx.fill();ctx.fillStyle=RED;ctx.fillRect(bx+8,by+bh-8-(bh-16)*0.18,(bw-16)*0.3,(bh-16)*0.18);ctx.globalAlpha=1;
  }else if(name==='speaking'){
    const k=blinkF(t,4.5,[2]);eyeCap(ctx,CX-72,CY-70,84,120*k,BLUE,BLUEG);eyeCap(ctx,CX+72,CY-70,84,120*k,BLUE,BLUEG);
    const ph=[0,1.1,2.2,0.6,1.7,0.3,2.5],sp=[6,8,5.5,9,6.5,7.5,5],n=7,bw=15,gap=11,total=n*bw+(n-1)*gap,x0=CX-total/2;
    for(let i=0;i<n;i++){const hh=30+66*Math.abs(Math.sin(t*sp[i]+ph[i]));glow(BLUEG,14,ctx);ctx.fillStyle=BLUE;rr(ctx,x0+i*(bw+gap),350-hh/2,bw,hh,8);ctx.fill();NO();}
  }else if(name==='listening'){
    for(let i=0;i<3;i++){const lt=((t-i*0.87)%2.6+2.6)%2.6,p=lt/2.6,sc=0.45+1.05*p,al=0.55*(1-p);ctx.globalAlpha=al;ctx.strokeStyle=BLUE;ctx.lineWidth=6;glow(BLUEG,10,ctx);ctx.beginPath();ctx.arc(CX,CY,150*sc,0,TAU);ctx.stroke();NO();}
    ctx.globalAlpha=1;const bob=Math.sin(t*TAU/3)*6;eyeCap(ctx,CX-78,CY+bob,92,130,BLUE,BLUEG);eyeCap(ctx,CX+78,CY+bob,92,130,BLUE,BLUEG);
  }else if(name==='transcribing'){
    const k=blinkF(t,5.5,[3]);eyeCap(ctx,CX-68,CY-66,80,96*k,BLUE,BLUEG);eyeCap(ctx,CX+68,CY-66,80,96*k,BLUE,BLUEG);
    const lines=[[230,0],[180,0.4],[120,0.8]];let y=300;ctx.fillStyle=BLUE;
    for(let i=0;i<3;i++){const[w,delay]=lines[i],a=0.32+0.46*(0.5+0.5*Math.sin((t-delay)*TAU/1.8));ctx.globalAlpha=a;rr(ctx,CX-115,y,w,18,9);ctx.fill();if(i===2){for(let d=0;d<3;d++){const da=((t-d*0.2)%1.2)/1.2;ctx.globalAlpha=0.25+0.75*Math.max(0,Math.sin(da*Math.PI));ctx.beginPath();ctx.arc(CX-115+w+24+d*22,y+9,6.5,0,TAU);ctx.fill();}}y+=34;}
    ctx.globalAlpha=1;
  }
}

const NAMES=['idle','happy','sleepy','curious','angry','love','charging','low-battery','speaking','listening','transcribing'];
const LABELS={idle:'待机 Idle',happy:'开心 Happy',sleepy:'困倦 Sleepy',curious:'好奇 Curious',angry:'生气 Angry',love:'爱心眼 Love',charging:'充电 Charging','low-battery':'低电量 Low',speaking:'说话 Speaking',listening:'聆听 Listening',transcribing:'转写 Transcribing'};
const cards=[];
const grid=document.getElementById('grid');
NAMES.forEach((name,idx)=>{
  const card=document.createElement('div');card.className='card';
  const cv=document.createElement('canvas');cv.width=480;cv.height=480;
  const nm=document.createElement('div');nm.className='name';nm.textContent=(idx+1<10?'0':'')+(idx+1)+' · '+LABELS[name];
  const btn=document.createElement('button');btn.className='ghost';btn.textContent='⬇︎ 下载 MP4';
  btn.onclick=async()=>{btn.disabled=true;btn.textContent='编码中…';const blob=await encode(name);dl(blob,fname(idx,name));btn.textContent='⬇︎ 下载 MP4';btn.disabled=false;};
  card.appendChild(cv);card.appendChild(nm);card.appendChild(btn);grid.appendChild(card);
  cards.push({name,cv,ctx:cv.getContext('2d'),paused:false});
});
function fname(idx,name){return (idx+1<10?'0':'')+(idx+1)+'-'+name+'.mp4';}
const t0=performance.now();
function loop(){const t=(performance.now()-t0)/1000;for(const c of cards){if(!c.paused)draw(c.ctx,c.name,t);}requestAnimationFrame(loop);}
loop();

async function encode(name){
  const card=cards.find(c=>c.name===name);card.paused=true;
  const fps=25,dur=3,N=fps*dur,ctx=card.ctx;
  const muxer=new Mp4Muxer.Muxer({target:new Mp4Muxer.ArrayBufferTarget(),video:{codec:'avc',width:480,height:480},fastStart:'in-memory'});
  const venc=new VideoEncoder({output:(c,m)=>muxer.addVideoChunk(c,m),error:e=>console.error(e)});
  venc.configure({codec:'avc1.42001e',width:480,height:480,bitrate:1500000,framerate:fps});
  for(let i=0;i<N;i++){const t=i/fps;draw(ctx,name,t);const f=new VideoFrame(card.cv,{timestamp:Math.round(i*1e6/fps),duration:Math.round(1e6/fps)});venc.encode(f,{keyFrame:i%fps===0});f.close();if(i%6===0)await new Promise(r=>setTimeout(r));}
  await venc.flush();muxer.finalize();card.paused=false;
  return new Blob([muxer.target.buffer],{type:'video/mp4'});
}
function dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},1000);}

// ---- minimal stored ZIP ----
const crcTable=(()=>{let c,t=[];for(let n=0;n<256;n++){c=n;for(let k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[n]=c>>>0;}return t;})();
function crc32(u8){let c=0xFFFFFFFF;for(let i=0;i<u8.length;i++)c=crcTable[(c^u8[i])&0xFF]^(c>>>8);return (c^0xFFFFFFFF)>>>0;}
function strBytes(s){const u=new Uint8Array(s.length);for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i);return u;}
function buildZip(files){
  const chunks=[],central=[];let offset=0;
  for(const f of files){
    const nameB=strBytes(f.name),data=f.data,crc=crc32(data);
    const lh=new DataView(new ArrayBuffer(30));
    lh.setUint32(0,0x04034b50,true);lh.setUint16(4,20,true);lh.setUint16(6,0,true);lh.setUint16(8,0,true);
    lh.setUint16(10,0,true);lh.setUint16(12,0,true);lh.setUint32(14,crc,true);
    lh.setUint32(18,data.length,true);lh.setUint32(22,data.length,true);lh.setUint16(26,nameB.length,true);lh.setUint16(28,0,true);
    chunks.push(new Uint8Array(lh.buffer),nameB,data);
    const ch=new DataView(new ArrayBuffer(46));
    ch.setUint32(0,0x02014b50,true);ch.setUint16(4,20,true);ch.setUint16(6,20,true);ch.setUint16(8,0,true);ch.setUint16(10,0,true);
    ch.setUint16(12,0,true);ch.setUint16(14,0,true);ch.setUint32(16,crc,true);ch.setUint32(20,data.length,true);ch.setUint32(24,data.length,true);
    ch.setUint16(28,nameB.length,true);ch.setUint16(30,0,true);ch.setUint16(32,0,true);ch.setUint16(34,0,true);ch.setUint16(36,0,true);
    ch.setUint32(38,0,true);ch.setUint32(42,offset,true);
    central.push(new Uint8Array(ch.buffer),nameB);
    offset+=30+nameB.length+data.length;
  }
  let cdSize=0;for(const c of central)cdSize+=c.length;const cdOffset=offset;
  const eo=new DataView(new ArrayBuffer(22));
  eo.setUint32(0,0x06054b50,true);eo.setUint16(8,files.length,true);eo.setUint16(10,files.length,true);
  eo.setUint32(12,cdSize,true);eo.setUint32(16,cdOffset,true);eo.setUint16(20,0,true);
  return new Blob([...chunks,...central,new Uint8Array(eo.buffer)],{type:'application/zip'});
}

document.getElementById('zipBtn').onclick=async()=>{
  const btn=document.getElementById('zipBtn'),st=document.getElementById('status');btn.disabled=true;
  const files=[];
  for(let i=0;i<NAMES.length;i++){st.textContent='编码 '+(i+1)+'/'+NAMES.length+' · '+LABELS[NAMES[i]]+' …';const blob=await encode(NAMES[i]);files.push({name:fname(i,NAMES[i]),data:new Uint8Array(await blob.arrayBuffer())});}
  st.textContent='打包 ZIP …';
  dl(buildZip(files),'DeskPet-mp4.zip');
  st.textContent='完成 ✓ 已下载 DeskPet-mp4.zip（共 '+files.length+' 个 MP4）';btn.disabled=false;
};
</script>
</body>
</html>
